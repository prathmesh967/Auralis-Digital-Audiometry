<!DOCTYPE html>

<html class="dark" lang="en"><head>

<title>Sonic Architect - Speech Test</title>

                        "label": ["Inter"]

<style>
        .glass-panel {
            background: rgba(32, 38, 47, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .waveform-bar {
            background: linear-gradient(to top, #00F2FE, #4FACFE);
            transition: height 0.3s ease;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body selection:bg-primary/30 min-h-screen">
<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 bg-slate-950/40 backdrop-blur-xl flex justify-between items-center px-6 py-4 shadow-[0_8px_32px_0_rgba(0,0,0,0.3)]">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full overflow-hidden border border-primary/20 bg-surface-container">
<img alt="Audiologist Profile" class="w-full h-full object-cover" data-alt="Professional Audiologist Portrait with modern glasses and lab coat in a clinical futuristic setting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBXb17feOWpsGnCRv7oPc_ezn5ntK6emG57ZGMOxTVyqiZMJNleT9YLVOg-cLg6wRYcBZV3XnKRlLDz-_REFB5vVNLcb87aSkNbZvQJps3-4kpG8p1k_zqzhNHJ-tbuXRmUkNEdbJyOo0lYmR1rWFrkulPwu9k5Q_0ZUQjeBhZbikEK2KP9SXKh1h05kvWlfHOK2tzM3pMeHokLln2H4ub9EritoBjHIx7wjekEXAJyM4Jahi6ztJsMdLinxj4WmNtUe64vNxVohCgb"/>
</div>
<h1 class="text-xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-500 font-headline">SONIC ARCHITECT</h1>
</div>
<button class="text-slate-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined">settings_input_component</span>
</button>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto">
<!-- Test Progress Section -->
<div class="mb-8">
<div class="flex justify-between items-end mb-2">
<span class="font-headline font-bold text-xs uppercase tracking-widest text-primary">Test Sequence 04/20</span>
<span class="font-headline font-black text-2xl text-on-surface">65%</span>
</div>
<div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
<div class="h-full bg-gradient-to-r from-cyan-400 to-blue-500 w-[65%] rounded-full shadow-[0_0_12px_rgba(0,242,254,0.4)]"></div>
</div>
</div>
<!-- Speech Score Card (Frosted Glass) -->
<div class="glass-panel p-6 rounded-[2rem] border border-white/5 mb-8 text-center shadow-2xl">
<label class="font-label text-[10px] font-bold uppercase tracking-[0.2em] text-outline mb-1 block">Speech Recognition Score</label>
<div class="font-headline font-bold text-6xl text-primary-dim tracking-tighter mb-2">92<span class="text-2xl font-light text-outline">%</span></div>
<p class="text-on-surface-variant text-sm leading-relaxed">High accuracy maintained despite moderate environmental interference.</p>
</div>
<!-- Audio Playback & Waveform Area -->
<div class="relative bg-surface-container-low rounded-[2.5rem] p-8 mb-8 overflow-hidden">
<!-- Background Waveform Motif -->
<div class="absolute inset-0 flex items-center justify-center gap-1.5 opacity-20 pointer-events-none px-12">
<div class="waveform-bar w-1.5 h-12 rounded-full"></div>
<div class="waveform-bar w-1.5 h-24 rounded-full"></div>
<div class="waveform-bar w-1.5 h-16 rounded-full"></div>
<div class="waveform-bar w-1.5 h-32 rounded-full"></div>
<div class="waveform-bar w-1.5 h-12 rounded-full"></div>
<div class="waveform-bar w-1.5 h-20 rounded-full"></div>
<div class="waveform-bar w-1.5 h-28 rounded-full"></div>
<div class="waveform-bar w-1.5 h-14 rounded-full"></div>
</div>
<div class="relative z-10 flex flex-col items-center">
<button class="w-24 h-24 rounded-full bg-gradient-to-br from-primary to-tertiary flex items-center justify-center text-on-tertiary shadow-[0_0_40px_rgba(0,242,254,0.3)] active:scale-90 transition-transform duration-300">
<span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<span class="mt-6 font-headline font-bold tracking-widest text-sm uppercase text-on-surface">Tap to Play Word</span>
<span class="text-xs text-outline mt-1 font-label">Binaural Audio Synthesis</span>
</div>
</div>
<!-- Noise Level Control -->
<div class="mb-10">
<div class="flex justify-between items-center mb-4">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant">Background Noise Level</label>
<span class="text-primary font-headline font-bold text-sm">Moderate</span>
</div>
<div class="grid grid-cols-3 gap-2 p-1 bg-surface-container rounded-2xl border border-white/5">
<button class="py-3 rounded-xl text-[10px] font-bold uppercase tracking-tighter text-outline hover:text-on-surface transition-colors">Quiet</button>
<button class="py-3 rounded-xl text-[10px] font-bold uppercase tracking-tighter bg-surface-bright text-primary shadow-lg border border-primary/10">Moderate</button>
<button class="py-3 rounded-xl text-[10px] font-bold uppercase tracking-tighter text-outline hover:text-on-surface transition-colors">High Noise</button>
</div>
</div>
<!-- Selection Grid -->
<div class="mb-6">
<label class="font-label text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-4 block">Select What You Heard</label>
<div class="grid grid-cols-2 gap-4">
<button class="glass-panel py-6 rounded-2xl border border-white/5 font-headline font-medium text-lg hover:border-primary/40 transition-all active:scale-95">WHISPER</button>
<button class="glass-panel py-6 rounded-2xl border border-white/5 font-headline font-medium text-lg hover:border-primary/40 transition-all active:scale-95">WINTER</button>
<button class="glass-panel py-6 rounded-2xl border border-white/5 font-headline font-medium text-lg hover:border-primary/40 transition-all active:scale-95">WEATHER</button>
<button class="glass-panel py-6 rounded-2xl border border-white/5 font-headline font-medium text-lg hover:border-primary/40 transition-all active:scale-95">WINNER</button>
</div>
</div>
<button class="w-full py-5 rounded-2xl bg-surface-container-highest border border-white/5 text-outline font-headline font-bold text-sm tracking-widest uppercase hover:text-on-surface transition-colors">
            Unsure / Repeat Word
        </button>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pt-3 pb-8 bg-slate-950/60 backdrop-blur-2xl rounded-t-[32px] border-t border-white/10 shadow-[0_-10px_40px_rgba(0,242,254,0.05)]">
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-colors">
<span class="material-symbols-outlined text-2xl">home_max</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-cyan-400 drop-shadow-[0_0_8px_rgba(0,242,254,0.6)] transform -translate-y-1 transition-all duration-500">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Test</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-colors">
<span class="material-symbols-outlined text-2xl">analytics</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">History</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-colors">
<span class="material-symbols-outlined text-2xl">psychology</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Insights</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-500 hover:text-cyan-200 transition-colors">
<span class="material-symbols-outlined text-2xl">tune</span>
<span class="font-['Inter'] text-[10px] font-bold uppercase tracking-widest mt-1">Settings</span>
</div>
</nav>
<!-- Decorative Grain Layer -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] mix-blend-overlay bg-[url('https://www.transparenttextures.com/patterns/p6.png')]"></div>
</body></html>
